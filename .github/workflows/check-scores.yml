name: BayParlays Score Check

# Dedicated grader. Hits /api/track/check-scores every 2 hours during US
# game hours. Lives separate from /api/daily so a failure in the daily
# cron's other steps (warming props, generating fresh picks) can't
# starve score grading.
#
# Created 2026-05-02 after discovering the cron-tied-to-daily setup
# stopped grading for ~2 days while the model was actually winning.
# Apr 30 was a +$1,064 day that read as -$80 in the dashboard until
# someone ran check-scores manually.

on:
  schedule:
    # Every 2 hours during US game hours: 21 UTC (2pm PT) → 09 UTC (2am PT)
    # = covers MLB afternoon, NBA primetime, late NHL/west-coast MLB
    - cron: "0 21,23,1,3,5,7,9 * * *"
  workflow_dispatch: {}

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/track/check-scores
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$CRON_SECRET" ]; then
            curl -fsSL -X GET "https://bayparlays.vercel.app/api/track/check-scores" \
              -H "Authorization: Bearer $CRON_SECRET" \
              --max-time 90
          else
            curl -fsSL -X GET "https://bayparlays.vercel.app/api/track/check-scores" \
              --max-time 90
          fi
