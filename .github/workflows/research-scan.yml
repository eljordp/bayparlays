name: BayParlays Research Scan

# Brute-force scans every valid 2/3/4-leg parlay from the day's edge-positive
# leg pool and persists the top 3,000 by EV to research_parlays. Runs 8x/day
# (every 3 hours) to capture line movement throughout the slate window.
#
# 5 sports × 8 scans = 40 credits/day. Combined with hourly line snapshots
# (~120/day) + resolver (~30/day) total is ~190/day, well under the
# 500/day Odds API budget JP has from daily key rotations.
#
# Uses Supabase service role to bypass the RLS public-read constraint on
# inserts. Anon key would work too since the table policies allow inserts.

on:
  schedule:
    # Every 3 hours, aligned to UTC clock for clean rollups in the
    # research_scans timestamp column.
    - cron: "0 0 * * *"
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
    - cron: "0 9 * * *"
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run research scanner
        env:
          BAYPARLAYS_BASE_URL: https://bayparlays.vercel.app
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/research-scan.ts
