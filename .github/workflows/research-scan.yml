name: BayParlays Research Scan

# Brute-force scans every valid 2/3/4-leg parlay from the day's edge-positive
# leg pool and persists the top 2,000 by EV to research_parlays. Runs 4x/day
# (every 6 hours) to capture line movement across the slate:
#   12:00 UTC (5am PT — pre-morning slate)
#   18:00 UTC (11am PT — pre-afternoon slate)
#   00:00 UTC (5pm PT — pre-evening slate)
#   06:00 UTC (11pm PT — post-late-game / overnight)
#
# Credit cost: ~5 credits per scan × 4 scans = 20 credits/day for scans.
# Combined with resolver runs (~30 credits/day) total is ~50/day — well
# under the 500/day Odds API budget.
#
# Uses Supabase service role to bypass the RLS public-read constraint on
# inserts. Anon key would work too since the table policies allow inserts.

on:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run research scanner
        env:
          BAYPARLAYS_BASE_URL: https://bayparlays.vercel.app
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/research-scan.ts
