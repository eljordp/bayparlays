name: BayParlays Research Scan

# Brute-force scans every valid 2/3/4-leg parlay from the day's edge-positive
# leg pool and persists the top 3,000 by EV to research_parlays. Runs 6x/day
# during ACTIVE HOURS — when odds actually move and new games appear in the
# pool. Was 8x/day evenly spread, but the 06:00 / 09:00 UTC slots scan the
# same leg pool we just captured at 00:00 / 03:00 (US is asleep, no new
# games or sharp action), so they were burning credits on duplicate data.
#
# 5 sports × 6 scans = 30 credits/day. Combined with hourly line snapshots
# (~65/day) + resolver (~30/day) total is ~125/day. Budget is 500/day.
#
# Uses Supabase service role to bypass the RLS public-read constraint on
# inserts. Anon key would work too since the table policies allow inserts.

on:
  schedule:
    - cron: "0 12 * * *"  # 5am PT — fresh morning odds, before slate post
    - cron: "0 15 * * *"  # 8am PT — sharp lookahead
    - cron: "0 18 * * *"  # 11am PT — afternoon games approaching
    - cron: "0 21 * * *"  # 2pm PT — early MLB tipoffs
    - cron: "0 0 * * *"   # 5pm PT — peak NBA/NHL tipoff window
    - cron: "0 3 * * *"   # 8pm PT — late games / closing odds
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run research scanner
        env:
          BAYPARLAYS_BASE_URL: https://bayparlays.vercel.app
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/research-scan.ts
