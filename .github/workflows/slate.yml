name: BayParlays Daily Slate

# Generates the canonical slate of parlays at the four moments bettors
# actually look at picks. Killed the 5am and 9pm PT slots (2026-04-30) —
# both were dead zones with no games to publish for.
#
# Slate windows (UTC → PT):
#   15:00 → "morning"   slate (8am PT)  — early MLB starts (noon ET)
#   19:00 → "midday"    slate (12pm PT) — lunch primary slate
#   23:00 → "primetime" slate (4pm PT)  — NBA/NHL/late MLB lock-in
#   02:00 → "late"      slate (7pm PT)  — west coast nightcaps

on:
  schedule:
    - cron: "0 15,19,23,2 * * *"
  workflow_dispatch: {}

jobs:
  slate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/generate-slate
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$CRON_SECRET" ]; then
            curl -fsSL -X GET "https://bayparlays.vercel.app/api/cron/generate-slate" \
              -H "Authorization: Bearer $CRON_SECRET" \
              --max-time 90
          else
            curl -fsSL -X GET "https://bayparlays.vercel.app/api/cron/generate-slate" \
              --max-time 90
          fi
