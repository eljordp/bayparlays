name: BayParlays Periodic Refresh

# Hits /api/daily which resolves pending parlays against real scores,
# generates fresh AI picks, and checks sim bets.
#
# 2026-04-30: re-anchored to game-hours instead of every 6h. With JP
# rotating to a fresh API key daily, credit budget is no longer the
# constraint — usefulness is. Now fires at 16/20/00/04 UTC = 9am/1pm/
# 5pm/9pm PT — the four moments where score-checking + auto-resolution
# actually matters. The 9pm PT pass catches all evening games as they
# end. Skipping the 5am-2pm UTC window since basically nothing has
# resolved overnight.

on:
  schedule:
    - cron: "0 16,20,0,4 * * *"
  workflow_dispatch: {} # lets you trigger manually from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /api/daily
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$CRON_SECRET" ]; then
            curl -fsSL -X GET "https://bayparlays.vercel.app/api/daily" \
              -H "Authorization: Bearer $CRON_SECRET" \
              --max-time 120
          else
            curl -fsSL -X GET "https://bayparlays.vercel.app/api/daily" \
              --max-time 120
          fi
