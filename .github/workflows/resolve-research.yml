name: BayParlays Resolve Research Parlays

# Grades pending research_parlays against actual game scores so the
# calibration job can use them as training data. Without this, the 500
# rows/scan that research-scan persists just sit at status='pending'
# forever and never contribute to learning.
#
# 2026-04-30: re-anchored to game-end windows (3am/8am UTC = 8pm/1am PT).
# That's when MLB/NBA/NHL games are wrapping up. The other 4 daily runs
# at random clock times were no-ops because no games had finished yet.

on:
  schedule:
    - cron: "0 3,8 * * *"   # 8pm PT and 1am PT — game-end windows
  workflow_dispatch: {}

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/resolve-research
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$CRON_SECRET" ]; then
            curl -fsSL -X GET "https://bayparlays.vercel.app/api/cron/resolve-research" \
              -H "Authorization: Bearer $CRON_SECRET" \
              --max-time 60
          else
            curl -fsSL -X GET "https://bayparlays.vercel.app/api/cron/resolve-research" \
              --max-time 60
          fi
